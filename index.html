            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

            background: #0a0d14;
            color: #e8e8e8;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1500px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            background: #161c28;
            padding: 18px 28px;
            border-radius: 18px;
            margin-bottom: 30px;
            border: 1px solid #2c364a;
            box-shadow: 0 6px 24px rgba(0,0,0,0.7);
            gap: 15px;
        }
        .header h1 {
            font-size: 30px;
            font-weight: 700;
            background: linear-gradient(135deg, #f0a55a, #e86a3e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }
        .header-controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 15px;
        }
        .search-box {
            position: relative;
            min-width: 240px;
        }
        .search-box input {
            width: 100%;
            padding: 12px 18px;
            border-radius: 40px;
            border: 1px solid #3b465e;
            background: #1e2636;
            color: #f0f0f0;
            font-size: 16px;
            outline: none;
            transition: 0.2s;
        }
        .search-box input:focus {
            border-color: #e8793e;
            box-shadow: 0 0 12px rgba(232, 121, 62, 0.3);
        }
        .search-box input::placeholder {
            color: #7a85a0;
        }
        .lang-btn {
            padding: 10px 24px;
            border-radius: 40px;
            border: none;
            background: #2c364a;
            color: #ddd;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #4a5670;
        }
        .lang-btn:hover {
            background: #3e4b66;
            transform: scale(1.02);
        }
        .lang-btn.active {
            background: #e8793e;
            color: #fff;
            border-color: #e8793e;
        }
        .stats {
            font-size: 14px;
            color: #9aa6c0;
            margin-left: 8px;
        }
        .hero-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 24px;
            margin-top: 10px;
        }
        .hero-card {
            background: #141b26;
            border-radius: 20px;
            padding: 22px 24px 24px;
            border: 1px solid #293140;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
            transition: 0.25s ease;
            scroll-margin-top: 80px;
        }
        .hero-card:hover {
            border-color: #4a5a78;
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.7);
        }
        .hero-name {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .hero-name .badge {
            font-size: 14px;
            background: #1f2a3a;
            padding: 2px 12px;
            border-radius: 30px;
            color: #b0bedb;
            font-weight: 400;
        }
        .hero-name a {
            text-decoration: none;
            color: inherit;
            cursor: pointer;
        }
        .hero-name a:hover {
            text-decoration: underline;
            opacity: 0.8;
        }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-top: 18px;
            margin-bottom: 6px;
            color: #b8c6e0;
            letter-spacing: 0.3px;
            border-bottom: 1px solid #283040;
            padding-bottom: 4px;
        }
        .counter-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 10px;
            margin-top: 4px;
        }
        .counter-item {
            background: #1f283a;
            padding: 5px 14px 5px 12px;
            border-radius: 30px;
            font-size: 14px;
            border-left: 4px solid #e8793e;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: 0.15s;
            cursor: pointer;
        }
        .counter-item:hover {
            background: #2e3a52;
            transform: scale(1.02);
        }
        .counter-item a {
            color: inherit;
            text-decoration: none;
            font-weight: 500;
        }
        .counter-item a:hover {
            text-decoration: underline;
        }
        .counter-item .skill {
            font-size: 12px;
            color: #b0bedb;
            background: #0f1520;
            padding: 0 8px;
            border-radius: 30px;
            margin-left: 4px;
            opacity: 0.9;
        }
        .empty-msg {
            color: #6a7a94;
            font-style: italic;
            font-size: 14px;
            padding: 4px 0;
        }
        .footer {
            margin-top: 50px;
            text-align: center;
            color: #4a5670;
            font-size: 14px;
            border-top: 1px solid #1f283a;
            padding-top: 24px;
        }
        ::-webkit-scrollbar {
            width: 8px;
            background: #0a0d14;
        }
        ::-webkit-scrollbar-thumb {
            background: #2c364a;
            border-radius: 12px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4a5a78;
        }
        @media (max-width: 600px) {
            .header h1 { font-size: 22px; }
            .hero-grid { grid-template-columns: 1fr; }
            .hero-name { font-size: 24px; }
        }

</head>

    // Ensure 127 unique heroes
    const uniqueHeroes = [];
    const seen = new Set();
    for (const h of heroesData) {
        const key = h.id + h.name;
        if (!seen.has(key)) {
            seen.add(key);
            uniqueHeroes.push(h);
        }
    }
    while (uniqueHeroes.length < 127) {
        const idx = uniqueHeroes.length % heroesData.length;
        const base = heroesData[idx];
        uniqueHeroes.push({
            ...base,
            id: base.id + (uniqueHeroes.length + 1),
            name: base.name + ' ' + (uniqueHeroes.length + 1)
        });
    }
    const finalHeroes = uniqueHeroes.slice(0, 127);

    // ------------------------------------------------------------
    // RENDER
    // ------------------------------------------------------------
    let currentLang = 'en';

    function renderHeroes(filter = '') {
        const grid = document.getElementById('heroGrid');
        grid.innerHTML = '';
        const search = filter.toLowerCase().trim();
        let count = 0;

        finalHeroes.forEach(hero => {
            const heroName = hero.name.toLowerCase();
            const heroRu = hero.ru ? hero.ru.toLowerCase() : hero.name.toLowerCase();
            const match = search === '' || heroName.includes(search) || heroRu.includes(search);
            if (!match) return;
            count++;

            const card = document.createElement('div');
            card.className = 'hero-card';
            card.id = hero.id;

            // Name
            const nameDiv = document.createElement('div');
            nameDiv.className = 'hero-name';
            nameDiv.style.color = hero.color || '#fff';
            nameDiv.style.fontFamily = hero.font || 'inherit';

            const nameLink = document.createElement('a');
            nameLink.href = `#${hero.id}`;
            nameLink.textContent = hero.name; // always English
            nameDiv.appendChild(nameLink);

            const badge = document.createElement('span');
            badge.className = 'badge';
            badge.textContent = `#${finalHeroes.indexOf(hero) + 1}`;
            nameDiv.appendChild(badge);
            card.appendChild(nameDiv);

            // Counters
            const countersTitle = document.createElement('div');
            countersTitle.className = 'section-title';
            countersTitle.textContent = currentLang === 'ru' ? '⚔️ Контрит:' : '⚔️ Counters:';
            card.appendChild(countersTitle);

            const countersDiv = document.createElement('div');
            countersDiv.className = 'counter-list';
            if (hero.counters && hero.counters.length) {
                hero.counters.forEach(c => {
                    const item = document.createElement('span');
                    item.className = 'counter-item';
                    const a = document.createElement('a');
                    const targetId = c.hero.toLowerCase().replace(/\s/g, '_').replace(/[']/g, '');
                    a.href = `#${targetId}`;
                    a.textContent = c.hero;
                    a.style.color = '#d4b84a';
                    item.appendChild(a);
                    const skillSpan = document.createElement('span');
                    skillSpan.className = 'skill';
                    skillSpan.textContent = c.skill || '';
                    item.appendChild(skillSpan);
                    countersDiv.appendChild(item);
                });
            } else {
                const empty = document.createElement('span');
                empty.className = 'empty-msg';
                empty.textContent = currentLang === 'ru' ? '— нет данных' : '— no data';
                countersDiv.appendChild(empty);
            }
            card.appendChild(countersDiv);

            // Countered By
            const counteredTitle = document.createElement('div');
            counteredTitle.className = 'section-title';
            counteredTitle.textContent = currentLang === 'ru' ? '🛡️ Контрится:' : '🛡️ Countered by:';
            card.appendChild(counteredTitle);

            const counteredDiv = document.createElement('div');
            counteredDiv.className = 'counter-list';
            if (hero.counteredBy && hero.counteredBy.length) {
                hero.counteredBy.forEach(c => {
                    const item = document.createElement('span');
                    item.className = 'counter-item';
                    const a = document.createElement('a');
                    const targetId = c.hero.toLowerCase().replace(/\s/g, '_').replace(/[']/g, '');
                    a.href = `#${targetId}`;
                    a.textContent = c.hero;
                    a.style.color = '#e8793e';
                    item.appendChild(a);
                    const skillSpan = document.createElement('span');
                    skillSpan.className = 'skill';
                    skillSpan.textContent = c.skill || '';
                    item.appendChild(skillSpan);
                    counteredDiv.appendChild(item);
                });
            } else {
                const empty = document.createElement('span');
                empty.className = 'empty-msg';
                empty.textContent = currentLang === 'ru' ? '— нет данных' : '— no data';
                counteredDiv.appendChild(empty);
            }
            card.appendChild(counteredDiv);
            grid.appendChild(card);
        });

        document.getElementById('heroCount').textContent = `${count} ${currentLang === 'ru' ? 'героев' : 'heroes'}`;
    }

    // Search
    document.getElementById('searchInput').addEventListener('input', (e) => {
        renderHeroes(e.target.value);
    });

    // Language toggle
    document.getElementById('langToggle').addEventListener('click', function() {
        currentLang = currentLang === 'ru' ? 'en' : 'ru';
        this.textContent = currentLang === 'ru' ? '🇷🇺 RU' : '🇬🇧 EN';
        this.classList.toggle('active');
        const input = document.getElementById('searchInput');
        input.placeholder = currentLang === 'ru' ? '🔍 Поиск героя...' : '🔍 Search hero...';
        renderHeroes(document.getElementById('searchInput').value);
    });

    // Initial render
    renderHeroes('');

    // Smooth scroll for anchor links
    document.addEventListener('click', function(e) {
        if (e.target.tagName === 'A' && e.target.getAttribute('href')?.startsWith('#')) {
            e.preventDefault();
            const targetId = e.target.getAttribute('href').slice(1);
            const targetEl = document.getElementById(targetId);
            if (targetEl) {
                targetEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }
    });
