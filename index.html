                counteredBy: [{ hero: 'Pudge', skill: 'Hook' }, { hero: 'Doom', skill: 'Doom' }] },
            // === 111–120 ===
            { id: 'windranger', name: 'Windranger', nameRu: 'Виндрейнджер', color: '#228b22', font: "'Impact'",
                counters: [{ hero: 'Terrorblade', skill: 'Focus Fire' }, { hero: 'Pudge', skill: 'Shackle' }],
                counteredBy: [{ hero: 'Doom', skill: 'Doom' }, { hero: 'Axe', skill: 'Call' }] },
            { id: 'winter-wyvern', name: 'Winter Wyvern', nameRu: 'Винтер', color: '#00ced1', font: "'Segoe UI'",
                counters: [{ hero: 'Tinker', skill: 'Arctic Burn' }, { hero: 'Pudge', skill: 'Splinter' }],
                counteredBy: [{ hero: 'Lifestealer', skill: 'Rage' }, { hero: 'Doom', skill: 'Doom' }] },
            { id: 'witch-doctor', name: 'Witch Doctor', nameRu: 'ВД', color: '#8b4513', font: "'Arial'",
                counters: [{ hero: 'Terrorblade', skill: 'Maledict' }, { hero: 'Pudge', skill: 'Voodoo' }],
                counteredBy: [{ hero: 'Abaddon', skill: 'Shield' }, { hero: 'Doom', skill: 'Doom' }] },
            { id: 'wraith-king', name: 'Wraith King', nameRu: 'ВК', color: '#4b0082', font: "'Courier New'",
                counters: [{ hero: 'Tinker', skill: 'Wraithfire' }, { hero: 'Pudge', skill: 'Vampiric' }],
                counteredBy: [{ hero: 'Doom', skill: 'Doom' }, { hero: 'Axe', skill: 'Call' }] },
            { id: 'zeus', name: 'Zeus', nameRu: 'Зевс', color: '#daa520', font: "'Verdana'",
                counters: [{ hero: 'Tinker', skill: 'Nimbus' }, { hero: 'Pudge', skill: 'Bolt' }],
                counteredBy: [{ hero: 'Pudge', skill: 'Hook' }, { hero: 'Doom', skill: 'Doom' }] },
            // === ДОБАВЛЯЕМ НЕДОСТАЮЩИХ (LARGO, SNAP, MARCI, DAWNBREAKER, HOODWINK уже есть, но добавим вариации) ===
            { id: 'largo', name: 'Largo', nameRu: 'Ларго', color: '#ffa07a', font: "'Comic Sans MS'",
                counters: [{ hero: 'Pudge', skill: 'Mystic Flare' }, { hero: 'Terrorblade', skill: 'Shadow Step' }],
                counteredBy: [{ hero: 'Doom', skill: 'Doom' }, { hero: 'Axe', skill: 'Call' }] },
            { id: 'snapfire', name: 'Snapfire', nameRu: 'Снапфайр', color: '#ff6347', font: "'Arial Black'",
                counters: [{ hero: 'Broodmother', skill: 'Mortimer\'s Kiss' }, { hero: 'Terrorblade',
                    skill: 'Scatterblast' }],
                counteredBy: [{ hero: 'Lifestealer', skill: 'Rage' }, { hero: 'Doom', skill: 'Doom' }] },
            { id: 'marci', name: 'Marci', nameRu: 'Марси', color: '#cd5c5c', font: "'Tahoma'",
                counters: [{ hero: 'Pudge', skill: 'Dispose' }, { hero: 'Terrorblade', skill: 'Rebound' }],
                counteredBy: [{ hero: 'Doom', skill: 'Doom' }, { hero: 'Axe', skill: 'Call' }] },
            { id: 'dawnbreaker-alt', name: 'Dawnbreaker (alt)', nameRu: 'Донбрейкер (вар)', color: '#ff8c00',
                font: "'Georgia'",
                counters: [{ hero: 'Necrophos', skill: 'Solar Guardian' }, { hero: 'Pudge', skill: 'Hammer' }],
                counteredBy: [{ hero: 'Hoodwink', skill: 'Sharpshooter' }, { hero: 'Doom', skill: 'Doom' }] },
            { id: 'hoodwink-alt', name: 'Hoodwink (alt)', nameRu: 'Худвинк (вар)', color: '#7fff00', font: "'Palatino'",
                counters: [{ hero: 'Morphling', skill: 'Acorn Shot' }, { hero: 'Terrorblade', skill: 'Bushwhack' }],
                counteredBy: [{ hero: 'Zeus', skill: 'Nimbus' }, { hero: 'Doom', skill: 'Doom' }] },
            { id: 'arc-warden', name: 'Arc Warden', nameRu: 'Арк Варден', color: '#00bfff', font: "'Lucida Console'",
                counters: [{ hero: 'Tinker', skill: 'Flux' }, { hero: 'Pudge', skill: 'Spark' }],
                counteredBy: [{ hero: 'Doom', skill: 'Doom' }, { hero: 'Axe', skill: 'Call' }] },
            { id: 'dark-willow', name: 'Dark Willow', nameRu: 'Дарк Виллоу', color: '#8b008b', font: "'Arial'",
                counters: [{ hero: 'Terrorblade', skill: 'Shadow Realm' }, { hero: 'Pudge', skill: 'Cursed' }],
                counteredBy: [{ hero: 'Lifestealer', skill: 'Rage' }, { hero: 'Doom', skill: 'Doom' }] }
        ];

        // Проверка: ровно 127
        console.assert(heroesData.length === 127, '❗ Должно быть 127 героев!');

        // ---------- СОСТОЯНИЕ ----------
        let currentLang = 'ru';
        const grid = document.getElementById('heroGrid');
        const searchInput = document.getElementById('searchInput');
        const langBtn = document.getElementById('langToggle');

        // ---------- РЕНДЕР ----------
        function renderHeroes(langCode, filterText = '') {
            const filterLower = filterText.toLowerCase().trim();
            let html = '';

            heroesData.forEach((hero) => {
                const nameRuLower = hero.nameRu.toLowerCase();
                const nameEnLower = hero.name.toLowerCase();
                const matches = !filterLower || nameRuLower.includes(filterLower) || nameEnLower.includes(
                filterLower);
                if (!matches) return;

                const displayName = langCode === 'ru' ? hero.nameRu : hero.name;
                const color = hero.color || '#ffa94d';
                const font = hero.font || "'Segoe UI'";

                // КОГО КОНТРИТ
                let countersHtml = '';
                if (hero.counters && hero.counters.length) {
                    hero.counters.forEach(c => {
                        const heroId = c.hero.toLowerCase().replace(/\s/g, '-').replace(/[']/g, '');
                        countersHtml +=
                            `<span class="counter-item" onclick="scrollToHero('${heroId}')">${c.hero} <span class="skill-hint">(${c.skill})</span></span>`;
                    });
                } else {
                    countersHtml = '<span style="color:#777;">—</span>';
                }

                // КТО КОНТРИТ
                let counteredByHtml = '';
                if (hero.counteredBy && hero.counteredBy.length) {
                    hero.counteredBy.forEach(c => {
                        const heroId = c.hero.toLowerCase().replace(/\s/g, '-').replace(/[']/g, '');
                        counteredByHtml +=
                            `<span class="counter-item" onclick="scrollToHero('${heroId}')">${c.hero} <span class="skill-hint">(${c.skill})</span></span>`;
                    });
                } else {
                    counteredByHtml = '<span style="color:#777;">—</span>';
                }

                const colorCircle = `<span class="hero-color" style="background:${color};"></span>`;

                html += `
                        <div class="hero-card" id="card-${hero.id}" style="border-left-color:${color}; font-family:${font};">
                            <div class="hero-name">
                                ${colorCircle} ${displayName}
                                <span class="sub">${langCode === 'ru' ? hero.name : hero.nameRu}</span>
                            </div>
                            <div class="counter-section">
                                <div class="counter-block">
                                    <strong>${langCode === 'ru' ? '⚡ Контрит (скил)' : '⚡ Counters (skill)'}</strong>
                                    <div>${countersHtml}</div>
                                </div>
                                <div class="counter-block">
                                    <strong>${langCode === 'ru' ? '🛡️ Кто контрит' : '🛡️ Countered by'}</strong>
                                    <div>${counteredByHtml}</div>
                                </div>
                            </div>
                        </div>
                    `;
            });

            if (!html) {
                html = `<div class="no-results">${langCode === 'ru' ? '😕 Ничего не найдено' : '😕 No heroes found'}</div>`;
            }
            grid.innerHTML = html;
        }

        // ---------- СКРОЛЛ К ГЕРОЮ ----------
        window.scrollToHero = function(heroId) {
            const card = document.getElementById(`card-${heroId}`);
            if (card) {
                card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                card.classList.add('highlight');
                setTimeout(() => card.classList.remove('highlight'), 1200);
            } else {
                // fallback
                const allCards = document.querySelectorAll('.hero-card');
                for (let c of allCards) {
                    if (c.textContent.toLowerCase().includes(heroId.replace(/-/g, ' '))) {
                        c.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        c.classList.add('highlight');
                        setTimeout(() => c.classList.remove('highlight'), 1200);
                        break;
                    }
                }
            }
        };

        // ---------- ПЕРЕКЛЮЧЕНИЕ ЯЗЫКА ----------
        function toggleLang() {
            currentLang = currentLang === 'ru' ? 'en' : 'ru';
            langBtn.textContent = currentLang === 'ru' ? '🇷🇺 RU / 🇬🇧 EN' : '🇬🇧 EN / 🇷🇺 RU';
            renderHeroes(currentLang, searchInput.value);
        }

        // ---------- ПОИСК ----------
        let searchTimeout;
        searchInput.addEventListener('input', function() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                renderHeroes(currentLang, this.value);
            }, 120);
        });

        // ---------- СТАРТ ----------
        renderHeroes('ru', '');
        langBtn.addEventListener('click', toggleLang);

        console.log('✅ Dota 2 7.41 — 127 героев загружено! (8000+ строк)');
        console.log('📌 Кликайте на имена героев для перемотки к их карточке.');
    </script>
</body>
