        }

        }

            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            padding: 1rem 1.5rem;
            background: #111820;
            border-radius: 20px;
            border: 1px solid #232a36;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .header-left h1 {
            color: #e6e9f0;
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .header-left h1 span {
            color: #ff6b35;
        }

        .header-left .subtitle {
            color: #7e8493;
            font-size: 0.85rem;
            font-weight: 400;
            background: #1a212c;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            border: 1px solid #2a313e;
        }

        .lang-toggle {
            display: flex;
            gap: 0.3rem;
            background: #1a212c;
            padding: 0.3rem;
            border-radius: 30px;
            border: 1px solid #2f3643;
        }

        .lang-toggle button {
            background: transparent;
            border: none;
            color: #8a8f9a;
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .lang-toggle button.active {
            background: #ff6b35;
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.25);
        }

        .lang-toggle button:hover:not(.active) {
            color: #d0d4de;
            background: #252e3d;
        }

        .search-wrap {
            position: relative;
            flex: 1;
            min-width: 200px;
            max-width: 450px;
        }

        .search-wrap input {
            width: 100%;
            padding: 0.75rem 1.2rem 0.75rem 2.8rem;
            border-radius: 40px;
            border: 1px solid #2f3643;
            background: #141b26;
            color: #e6e9f0;
            font-size: 0.95rem;
            outline: none;
            transition: 0.2s;
        }

        .search-wrap input:focus {
            border-color: #ff6b35;
            box-shadow: 0 0 0 4px rgba(255, 107, 53, 0.12);
        }

        .search-wrap input::placeholder {
            color: #5e6472;
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #5e6472;
            font-size: 1.1rem;
            pointer-events: none;
        }

        .suggestions {
            position: absolute;
            top: calc(100% + 10px);
            left: 0;
            right: 0;
            background: #141b26;
            border: 1px solid #2f3643;
            border-radius: 16px;
            max-height: 400px;
            overflow-y: auto;
            display: none;
            z-index: 1000;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
            padding: 0.4rem 0;
        }

        .suggestions.show {
            display: block;
        }

        .suggestion-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.7rem 1.2rem;
            cursor: pointer;
            color: #d0d4de;
            transition: 0.15s;
            border-left: 3px solid transparent;
        }

        .suggestion-item:hover {
            background: #1f2939;
            border-left-color: #ff6b35;
        }

        .suggestion-item .color-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .suggestion-item .hero-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .stats-bar {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            padding: 0.8rem 1.5rem;
            background: #111820;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            border: 1px solid #1e2633;
            color: #8a8f9a;
            font-size: 0.9rem;
        }

        .stats-bar span {
            color: #e6e9f0;
            font-weight: 700;
        }

        .hero-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
        }

        .hero-card {
            background: #111820;
            border-radius: 18px;
            padding: 1.3rem 1.2rem 1.2rem;
            border: 1px solid #1e2633;
            transition: 0.25s;
            cursor: default;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
        }

        .hero-card:hover {
            border-color: #3d4557;
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
            background: #131c28;
        }

        .hero-card .hero-title {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 0.8rem;
            border-bottom: 1px solid #1e2633;
            padding-bottom: 0.7rem;
        }

        .hero-card .hero-title .color-badge {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.08);

        .hero-card .hero-title .name {
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: 0.2px;
        }

        .hero-card .counter-section {
            font-size: 0.8rem;
            line-height: 1.6;
        }

        .hero-card .counter-section .label {
            color: #7e8493;
            font-weight: 700;
            letter-spacing: 0.4px;
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-top: 0.6rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .hero-card .counter-section .label:first-child {
            margin-top: 0;
        }

        .hero-card .counter-section .tag-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem 0.5rem;
            margin-top: 0.2rem;
        }

        .hero-card .counter-section .tag {
            display: inline-block;
            padding: 0.1rem 0.6rem;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.72rem;
            background: #1a212c;
            border: 1px solid #2a313e;
            color: #c8cdd9;
            transition: 0.15s;
            cursor: pointer;
            text-decoration: none;
        }

        .hero-card .counter-section .tag.strong {
            border-color: #4caf50;
            color: #81c784;
            background: #1a2a1a;
        }

        .hero-card .counter-section .tag.weak {
            border-color: #ef5350;
            color: #ef9a9a;
            background: #2a1a1a;
        }

        .hero-card .counter-section .tag:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
            box-shadow: 0 0 12px rgba(255,107,53,0.2);
        }

            font-size: 0.7rem;
            color: #7e8493;
            margin-top: 0.3rem;
            padding-left: 0.6rem;
            border-left: 2px solid #2a313e;
            line-height: 1.4;
        }

            grid-column: 1 / -1;
            text-align: center;
            color: #5e6472;
            padding: 4rem 0;
            font-size: 1.2rem;
        }

            font-size: 0.8rem;
            text-align: center;
            border-top: 1px solid #1a212c;

    let currentLang = 'ru';
    let searchQuery = '';

    const gridEl = document.getElementById('heroGrid');
    const searchInput = document.getElementById('searchInput');
    const suggestionsEl = document.getElementById('suggestions');
    const langBtns = document.querySelectorAll('.lang-toggle button');
    const totalHeroesEl = document.getElementById('totalHeroes');
    const shownHeroesEl = document.getElementById('shownHeroes');

    function getHeroById(id) {
        return HEROES_DATA.find(h => h.id === id);
    }

    function scrollToHero(heroId) {
        const card = document.querySelector(`.hero-card[data-hero-id="${heroId}"]`);
        if (card) {
            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            card.style.borderColor = '#ff6b35';
            card.style.boxShadow = '0 0 30px rgba(255,107,53,0.3)';
            setTimeout(() => {
                card.style.borderColor = '';
                card.style.boxShadow = '';
            }, 2000);
        }
    }

    function renderHeroes(lang, query = '') {
        const q = query.toLowerCase().trim();
        let filtered = HEROES_DATA;

        if (q) {
            filtered = HEROES_DATA.filter(h => {
                const name = h.name[lang] || h.name.ru;
                return name.toLowerCase().includes(q);
            });
        }

        shownHeroesEl.textContent = filtered.length;
        totalHeroesEl.textContent = HEROES_DATA.length;

        if (filtered.length === 0) {
            gridEl.innerHTML = `<div class="no-results">${lang === 'ru' ? 'Героев не найдено' : 'No heroes found'}</div>`;
            return;
        }

        let html = '';
        filtered.forEach(hero => {
            const name = hero.name[lang] || hero.name.ru;
            const counters = hero.counters[lang] || hero.counters.ru;
            const strong = counters.strong || [];
            const weak = counters.weak || [];

            let strongHtml = '';
            if (strong.length) {
                strongHtml = strong.map(item => {
                    const targetHero = getHeroById(item.name.toLowerCase().replace(/ /g, '_'));
                    const onClick = targetHero ? `onclick="window.scrollToHero('${targetHero.id}')"` : '';
                    return `<span class="tag strong" ${onClick} data-hero="${item.name}">${item.name}</span>`;
                }).join('');
                strongHtml += `<div class="counter-detail">${strong.map(item => 
                    `${item.name}: ${item.reason} (${item.skills})`
                ).join('; ')}</div>`;
            } else {
                strongHtml = `<span class="tag">${lang === 'ru' ? '—' : '—'}</span>`;
            }

            let weakHtml = '';
            if (weak.length) {
                weakHtml = weak.map(item => {
                    const targetHero = getHeroById(item.name.toLowerCase().replace(/ /g, '_'));
                    const onClick = targetHero ? `onclick="window.scrollToHero('${targetHero.id}')"` : '';
                    return `<span class="tag weak" ${onClick} data-hero="${item.name}">${item.name}</span>`;
                }).join('');
                weakHtml += `<div class="counter-detail">${weak.map(item => 
                    `${item.name}: ${item.reason} (${item.skills})`
                ).join('; ')}</div>`;
            } else {
                weakHtml = `<span class="tag">${lang === 'ru' ? '—' : '—'}</span>`;
            }

            html += `
                <div class="hero-card" data-hero-id="${hero.id}">
                    <div class="hero-title">
                        <span class="color-badge" style="background:${hero.color};"></span>
                        <span class="name" style="color:${hero.color}; font:${hero.font};">${name}</span>
                    </div>
                    <div class="counter-section">
                        <div class="label">${lang === 'ru' ? '🔹 КОНТРИТ (сильные стороны)' : '🔹 COUNTERS (strong vs)'}</div>
                        <div class="tag-group">${strongHtml}</div>
                        <div class="label" style="margin-top:0.6rem;">${lang === 'ru' ? '🔸 КОНТРИТСЯ (слабые стороны)' : '🔸 COUNTERED BY (weak vs)'}</div>
                        <div class="tag-group">${weakHtml}</div>
                    </div>
                </div>
            `;
        });

        gridEl.innerHTML = html;
    }

    function updateSuggestions(query) {
        const q = query.toLowerCase().trim();
        if (!q) {
            suggestionsEl.classList.remove('show');
            return;
        }

        const matches = HEROES_DATA.filter(h => {
            const name = h.name[currentLang] || h.name.ru;
            return name.toLowerCase().includes(q);
        }).slice(0, 10);

        if (matches.length === 0) {
            suggestionsEl.classList.remove('show');
            return;
        }

        let html = '';
        matches.forEach(h => {
            const name = h.name[currentLang] || h.name.ru;
            html += `
                <div class="suggestion-item" data-hero-id="${h.id}">
                    <span class="color-dot" style="background:${h.color};"></span>
                    <span class="hero-name" style="color:${h.color};">${name}</span>
                    <span class="hero-role">${h.role || ''}</span>
                </div>
            `;
        });

        suggestionsEl.innerHTML = html;
        suggestionsEl.classList.add('show');

        suggestionsEl.querySelectorAll('.suggestion-item').forEach(item => {
            item.addEventListener('click', function() {
                const id = this.dataset.heroId;
                const hero = getHeroById(id);
                if (hero) {
                    searchInput.value = hero.name[currentLang] || hero.name.ru;
                    suggestionsEl.classList.remove('show');
                    renderHeroes(currentLang, searchInput.value);
                    scrollToHero(hero.id);
                }
            });
        });
    }

    searchInput.addEventListener('input', function(e) {
        const val = this.value;
        searchQuery = val;
        updateSuggestions(val);
        renderHeroes(currentLang, val);
    });

    document.addEventListener('click', function(e) {
        if (!e.target.closest('.search-wrap')) {
            suggestionsEl.classList.remove('show');
        }
    });

    langBtns.forEach(btn => {
        btn.addEventListener('click', function() {
            langBtns.forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentLang = this.dataset.lang;
            searchInput.placeholder = currentLang === 'ru' ? 'Поиск героя...' : 'Search hero...';
            renderHeroes(currentLang, searchInput.value);
            updateSuggestions(searchInput.value);
        });
    });

    window.scrollToHero = scrollToHero;

    renderHeroes('ru', '');
</script>
