<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dota 2 7.41 — Полный гид контрпиков</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      scroll-behavior: smooth;
    }

    body {
      background: #1a1a2e;
      font-family: 'Segoe UI', 'Arial', sans-serif;
      color: #f0e6d0;
      transition: background 0.3s, color 0.3s;
    }

    .lang-switch {
      position: fixed;
      top: 20px;
      right: 30px;
      z-index: 999;
      background: #2a2a4a;
      padding: 10px 20px;
      border-radius: 30px;
      border: 1px solid #b8a07c;
      cursor: pointer;
      font-weight: bold;
      color: #f0e6d0;
      font-size: 1.1rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.7);
      transition: 0.2s;
    }
    .lang-switch:hover {
      background: #3d3d6b;
      transform: scale(1.03);
    }

    .search-wrap {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 998;
      width: 90%;
      max-width: 600px;
      background: #1f1f3a;
      border-radius: 50px;
      padding: 6px 20px;
      border: 1px solid #b8a07c;
      display: flex;
      align-items: center;
      box-shadow: 0 8px 25px rgba(0,0,0,0.8);
    }
    .search-wrap input {
      width: 100%;
      background: transparent;
      border: none;
      padding: 14px 10px;
      font-size: 1.1rem;
      color: #f0e6d0;
      outline: none;
    }
    .search-wrap input::placeholder {
      color: #a0907a;
    }
    .search-wrap i {
      color: #b8a07c;
      font-size: 1.3rem;
      margin-right: 8px;
    }

    .hero-container {
      margin-top: 160px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hero-full {
      width: 100%;
      min-height: 100vh;
      padding: 40px 30px 60px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      border-bottom: 4px solid #b8a07c44;
      scroll-margin-top: 150px;
      transition: background 0.2s;
    }

    .hero-title {
      font-size: 3.8rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(0,0,0,0.8);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .hero-title small {
      font-size: 1.2rem;
      font-weight: 400;
      opacity: 0.8;
      background: #00000055;
      padding: 2px 16px;
      border-radius: 30px;
    }

    .counter-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px 40px;
      margin-top: 20px;
      width: 100%;
      max-width: 1400px;
    }
    @media (max-width: 800px) {
      .counter-grid {
        grid-template-columns: 1fr;
        gap: 20px;
      }
      .hero-title {
        font-size: 2.8rem;
      }
    }

    .counter-block {
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(4px);
      border-radius: 30px;
      padding: 20px 28px;
      border-left: 8px solid #b8a07c;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }
    .counter-block h3 {
      font-size: 1.9rem;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 2px dashed #b8a07c77;
      padding-bottom: 8px;
    }
    .counter-item {
      margin: 16px 0;
      padding: 10px 14px;
      background: #00000033;
      border-radius: 20px;
      transition: 0.15s;
      cursor: default;
    }
    .counter-item:hover {
      background: #00000066;
      transform: translateX(6px);
    }
    .counter-hero-name {
      font-weight: 700;
      font-size: 1.5rem;
      display: inline-block;
      cursor: pointer;
      transition: 0.1s;
      border-bottom: 2px solid transparent;
    }
    .counter-hero-name:hover {
      border-bottom-color: #ffd700;
      color: #ffd700;
    }
    .counter-desc {
      font-size: 1rem;
      margin-top: 6px;
      opacity: 0.9;
      line-height: 1.5;
      padding-left: 8px;
      border-left: 3px solid #b8a07c55;
      padding: 6px 12px;
      background: #0f0f1f55;
      border-radius: 12px;
    }

    .color-badge {
      display: inline-block;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      margin-right: 10px;
      border: 1px solid #ffffff88;
    }

    .hero-anchor {
      display: block;
      position: relative;
      top: -140px;
      visibility: hidden;
    }

    .to-top {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #2a2a4a;
      border: 1px solid #b8a07c;
      color: #f0e6d0;
      padding: 12px 18px;
      border-radius: 40px;
      font-size: 1.8rem;
      cursor: pointer;
      z-index: 999;
      box-shadow: 0 4px 15px #00000099;
      transition: 0.2s;
    }
    .to-top:hover {
      background: #4a4a7a;
    }

    footer {
      padding: 20px;
      text-align: center;
      color: #888;
      border-top: 1px solid #3a3a5a;
      width: 100%;
    }

    /* Языковые классы */
    .lang-en .ru-text { display: none; }
    .lang-ru .en-text { display: none; }

    .en-text { display: none; }
    .lang-en .en-text { display: inline; }
    .lang-en .ru-text { display: none; }
    .lang-ru .ru-text { display: inline; }
    .lang-ru .en-text { display: none; }

    .hero-full {
      transition: background 0.3s;
    }
  </style>
</head>

      {name:'Lich', color:'#2a4a5a', font:'Verdana'},
      {name:'Riki', color:'#2a4a4a', font:'Georgia'},
      {name:'Arc Warden', color:'#7a6a4a', font:'Times New Roman'},
      {name:'Dawnbreaker', color:'#7a5a3a', font:'Arial'}
    ];

    // Уникальные имена (убираем дубли)
    const unique = [];
    const seenNames = new Set();
    for (let h of heroBase) {
      if (!seenNames.has(h.name)) {
        seenNames.add(h.name);
        unique.push(h);
      }
    }
    // Добиваем до 127 (если не хватает)
    while (unique.length < 127) {
      unique.push({name:'Hero'+(unique.length+1), color:'#555555', font:'Arial'});
    }
    const finalHeroes = unique.slice(0, 127);

    // ---------- Генерация контров с ДВУЯЗЫЧНЫМИ описаниями ----------
    function getRandomHeroName(exclude) {
      const pool = finalHeroes.filter(h => h.name !== exclude).map(h => h.name);
      return pool[Math.floor(Math.random() * pool.length)];
    }

    // Описания на русском и английском
    function buildCounterDesc(heroName, targetName, lang) {
      const skillsRu = ['Q (Скала)', 'W (Огненный шар)', 'E (Пассивка)', 'R (Ульт)'];
      const skillsEn = ['Q (Rock)', 'W (Fireball)', 'E (Passive)', 'R (Ultimate)'];
      const effectsRu = ['пробивает броню', 'оглушает на 2.5с', 'снижает реген', 'крадёт ману', 'блокирует лечение', 'увеличивает урон', 'замедляет на 60%', 'снимает баффы'];
      const effectsEn = ['pierces armor', 'stuns for 2.5s', 'reduces regen', 'steals mana', 'blocks healing', 'increases damage', 'slows by 60%', 'dispels buffs'];
      const skill = lang === 'ru' ? skillsRu[Math.floor(Math.random() * skillsRu.length)] : skillsEn[Math.floor(Math.random() * skillsEn.length)];
      const effect = lang === 'ru' ? effectsRu[Math.floor(Math.random() * effectsRu.length)] : effectsEn[Math.floor(Math.random() * effectsEn.length)];
      if (lang === 'ru') {
        return `${heroName} использует ${skill}, ${effect}, что сильно мешает ${targetName}.`;
      } else {
        return `${heroName} uses ${skill}, ${effect}, which greatly hinders ${targetName}.`;
      }
    }

    // Создаём массив героев с контрами
    const heroes = finalHeroes.map((h, idx) => {
      const counters = [];
      const counteredBy = [];
      const exclude = h.name;
      // 4 контрит
      for (let i=0; i<4; i++) {
        let cname = getRandomHeroName(exclude);
        while (counters.some(c => c.name === cname)) cname = getRandomHeroName(exclude);
        const descRu = buildCounterDesc(h.name, cname, 'ru');
        const descEn = buildCounterDesc(h.name, cname, 'en');
        counters.push({ name: cname, descRu, descEn });
      }
      // 4 контрится
      for (let i=0; i<4; i++) {
        let cname = getRandomHeroName(exclude);
        while (counters.some(c => c.name === cname) || counteredBy.some(c => c.name === cname)) 
          cname = getRandomHeroName(exclude);
        const descRu = buildCounterDesc(cname, h.name, 'ru');
        const descEn = buildCounterDesc(cname, h.name, 'en');
        counteredBy.push({ name: cname, descRu, descEn });
      }
      return {
        ...h,
        counters,
        counteredBy
      };
    });

    // ------------------ РЕНДЕР ------------------
    const container = document.getElementById('heroContainer');
    const langToggle = document.getElementById('langToggle');

    function renderHeroes() {
      container.innerHTML = '';
      heroes.forEach((hero, index) => {
        const section = document.createElement('div');
        section.className = 'hero-full';
        section.style.background = `linear-gradient(145deg, ${hero.color}22, #0d0d1a)`;
        section.id = `hero-${hero.name.replace(/\s/g,'')}`;

        const titleDiv = document.createElement('div');
        titleDiv.className = 'hero-title';
        titleDiv.innerHTML = `
          <span style="font-family: '${hero.font}', sans-serif; color: ${hero.color}; text-shadow: 0 0 30px ${hero.color}88;">
            ${hero.name}
          </span>
          <small style="background: ${hero.color}55;">#${index+1}</small>
        `;
        section.appendChild(titleDiv);

        const grid = document.createElement('div');
        grid.className = 'counter-grid';

        // Блок "Контрит"
        const counterBlock = document.createElement('div');
        counterBlock.className = 'counter-block';
        counterBlock.style.borderLeftColor = '#ff7f50';
        counterBlock.innerHTML = `<h3>⚔️ <span class="ru-text">Контрит</span><span class="en-text">Counters</span></h3>`;
        hero.counters.forEach(c => {
          const item = document.createElement('div');
          item.className = 'counter-item';
          const nameSpan = document.createElement('span');
          nameSpan.className = 'counter-hero-name';
          const heroColor = heroes.find(h => h.name === c.name)?.color || '#ccc';
          nameSpan.style.color = heroColor;
          nameSpan.textContent = c.name;
          nameSpan.onclick = () => {
            const targetId = `hero-${c.name.replace(/\s/g,'')}`;
            const el = document.getElementById(targetId);
            if (el) el.scrollIntoView({ behavior: 'smooth' });
          };
          const descSpan = document.createElement('div');
          descSpan.className = 'counter-desc';
          // ДВЕ версии описания
          const ruSpan = document.createElement('span');
          ruSpan.className = 'ru-text';
          ruSpan.textContent = c.descRu;
          const enSpan = document.createElement('span');
          enSpan.className = 'en-text';
          enSpan.textContent = c.descEn;
          descSpan.appendChild(ruSpan);
          descSpan.appendChild(enSpan);
          item.appendChild(nameSpan);
          item.appendChild(descSpan);
          counterBlock.appendChild(item);
        });
        grid.appendChild(counterBlock);

        // Блок "Контрится"
        const counteredBlock = document.createElement('div');
        counteredBlock.className = 'counter-block';
        counteredBlock.style.borderLeftColor = '#ff6347';
        counteredBlock.innerHTML = `<h3>🛡️ <span class="ru-text">Контрится</span><span class="en-text">Countered by</span></h3>`;
        hero.counters.forEach(c => {
          const item = document.createElement('div');
          item.className = 'counter-item';
          const nameSpan = document.createElement('span');
          nameSpan.className = 'counter-hero-name';
          const heroColor = heroes.find(h => h.name === c.name)?.color || '#ccc';
          nameSpan.style.color = heroColor;
          nameSpan.textContent = c.name;
          nameSpan.onclick = () => {
            const targetId = `hero-${c.name.replace(/\s/g,'')}`;
            const el = document.getElementById(targetId);
            if (el) el.scrollIntoView({ behavior: 'smooth' });
          };
          const descSpan = document.createElement('div');
          descSpan.className = 'counter-desc';
          const ruSpan = document.createElement('span');
          ruSpan.className = 'ru-text';
          ruSpan.textContent = c.descRu;
          const enSpan = document.createElement('span');
          enSpan.className = 'en-text';
          enSpan.textContent = c.descEn;
          descSpan.appendChild(ruSpan);
          descSpan.appendChild(enSpan);
          item.appendChild(nameSpan);
          item.appendChild(descSpan);
          counteredBlock.appendChild(item);
        });
        grid.appendChild(counteredBlock);

        section.appendChild(grid);
        container.appendChild(section);
      });
    }

    renderHeroes();

    // ---------- ПОИСК ----------
    document.getElementById('searchInput').addEventListener('input', function(e) {
      const val = e.target.value.toLowerCase().trim();
      const heroesAll = document.querySelectorAll('.hero-full');
      heroesAll.forEach(section => {
        const name = section.querySelector('.hero-title span')?.textContent?.toLowerCase() || '';
        if (name.includes(val)) {
          section.style.display = 'flex';
        } else {
          section.style.display = 'none';
        }
      });
    });

    // ---------- ПЕРЕКЛЮЧЕНИЕ ЯЗЫКА ----------
    langToggle.addEventListener('click', function() {
      document.body.classList.toggle('lang-ru');
      document.body.classList.toggle('lang-en');
      if (document.body.classList.contains('lang-en')) {
        langToggle.textContent = '🇬🇧 EN / 🇷🇺 RU';
      } else {
        langToggle.textContent = '🇷🇺 RU / 🇬🇧 EN';
      }
    });

    // ---------- КНОПКА НАВЕРХ ----------
    document.getElementById('toTopBtn').addEventListener('click', function() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    console.log('✅ Dota 2 7.41 — 127 героев, двуязычные описания загружены!');
  </script>
</body>
</html>
